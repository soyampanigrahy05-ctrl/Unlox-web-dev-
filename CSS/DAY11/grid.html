<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRID</title>
    <style>
        .product{
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 20px;
            background-color: aqua;
            
        }
        .box{
            background-color: aquamarine;
            padding: 10px;
            border: 2px solid black;
            text-align: center;
            font-weight: bolder;

        }
    </style>
</head>
<body>
    <div class="product">
        <div class="box">cake</div>
        <div class="box">price</div>
        <div class="box">cookie</div>
        <div class="box">price</div>
        <div class="box">pastry</div>
        <div class="box">price</div>
    </div>
</body>
</html>
