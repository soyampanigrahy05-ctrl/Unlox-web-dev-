<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GROUP selector</title>
    <style>
        h1,h2,h3,p{
            color: dodgerblue;
        }
        body{
            background-color: bisque;
        }
    </style>
</head>
<body>
    <h1>amazon</h1>
    <h2>netflix</h2>
    <h3>welcome to css</h3>
    <p>this is a paragraph</p>
</body>
</html>
