<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CLASS selector</title>
  </head>
  <style>
    .ipl {
      color: violet;
      font-style: italic;
      background-color: aqua;
      width: 70px;
    }
    div{
      border: 5px solid lightgrey;
      width: 100px;
    }
    .rcb{
color: red;
    }
    .csk{
        color:yellow ;
    }
    .mi{
        color: blue;
    }
    .gt{
        color: darkcyan;
    }
    .shk{
        color: orange;
    }
  </style>
  <body>
    <h1 class="ipl">IPL</h1>
    <div>
      <p class="rcb"><span style=" color: deeppink;">RR</span> VS RCB</p>
      <p class="csk"><span style=" color: deeppink;">RR</span> VS CSK</p>
      <p class="mi"><span style=" color: deeppink;">RR</span>  VS MI</p>
      <p class="gt"><SPAn style=" color: deeppink;">RR</SPAn>  VS GT</p>
      <p class="shk"><SPAn style=" color: deeppink;">RR</SPAn> VS SHK</p>
    </div>
  </body>
</html>
