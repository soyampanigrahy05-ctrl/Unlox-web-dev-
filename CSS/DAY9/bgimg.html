<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BG IMAGE</title>
    <style>
        body{
            font-family: cursive;
            margin: 0;
        }
      .banner {
        border: 1px solid black;
        height: 1000px;
        text-align: center;
        font-size: 30px;
        color: chocolate;
        text-shadow: 0 2px 4px rgb(207, 140, 25);

        background-image: url(https://images.pexels.com/photos/2519218/pexels-photo-2519218.jpeg);
       background-position: center;
       background-size: cover;
       background-attachment: fixed;
        /* filter: blur(2px); */
        filter: brightness(80%);
    }
    </style>
  </head>
  <body>
    <div class="banner"><h1>Cafe Coffee Day</h1></div>
  </body>
</html>
