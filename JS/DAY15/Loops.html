<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Js</title>
  </head>
  <body>
    <script>
        //Loop:-
        //1.For loop
        for(let i=1;i<=10;i++)
    {
        console.log(i)
    }
    //2. While loop
        let count=1
        while(count<=5)
    {
        console.log("Hello gyus")
        count++
    }
    //3. Do-while loop
        let num=5
        do{
            console.log("It is a Do while Loop")
            num++
        }while(num>7);
    </script>
  </body>
</html>
