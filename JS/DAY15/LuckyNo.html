<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky No.</title>
</head>
<body>
    <script>
        let LuckyNo = Math.floor(Math.random()*100)+1
       // console.log(LuckyNo)
       while(1)
       {
        let num=prompt("Enter Your Number b/w 1to 100")
        if(LuckyNo===num)
       {
        alert("You Won")
        break;
       }
       else{
        alert("Better Luck Next Time")
       }
       }
    </script>
</body>
</html>
