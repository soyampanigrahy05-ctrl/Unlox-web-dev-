<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .movie {
        border: 2px solid brown;
        border-radius: 12px;
        max-width: 500px;
        margin:auto;
        padding: 10px;
        background-color: aliceblue;
      }
      .movie:hover {
        transform: scale(1.1);
        transition: 2s;
        box-shadow: 2px 4px 8px black;
      }
    </style>
  </head>
  <body>
    <h1>Movie detail</h1>
    <input type="text" id="movieInput" placeholder="enter your Movie name" />
    <button onclick="HandleSearch()">Search movie</button>
    <div class="movie" id="movieContainer"></div>
    <script>
      async function getmovie(movieName) {
        let url = `http://www.omdbapi.com/?apikey=&t=${movieName}`;
        try {
          let response = await fetch(url);
          let data = await response.json();
          console.log(data);
          if (data.Response == "True") {
            const movieContainer = document.getElementById("movieContainer");
            movieContainer.innerHTML = `
            <img src="${data.Poster}" style="width:100%;heigth:100%;">
            <h2>${data.Title}</h2>
            <p>${data.Year}</p>
            <p>${data.Plot}</p>        
            `
            movieContainer.style.textAlign="center"    ;
            movieContainer.style.backgroundColor="pink"

          } else {
            alert("Movie not found");
          }
        } catch (error) {
          console.log("Error Fetching movie", error);
        }
      }

      function HandleSearch() {
        const movieName = document.getElementById("movieInput").value;
        if (movieName) {
          getmovie(movieName);
        }
      }
    </script>
  </body>
</html>
