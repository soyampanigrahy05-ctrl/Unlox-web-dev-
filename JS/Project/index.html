<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ai Movie Finder</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Mood Movie Finder</h1>
      <p>Select your Mood And Get The Movie Recommendation</p>

      <div class="mood-button">
        <button data-mood="comedy">Happy😀</button>
        <button data-mood="drama">Sad🥲</button>
        <button data-mood="action">Excited🤩</button>
        <button data-mood="romance">Romantic😘</button>
        <button data-mood="horror">Scared👻</button>
      </div>

      <div id="movies-container">

      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
