<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATA LIST</title>
</head>
<body>
    <label>choose a fruit:</label>
    <input list="fruits" name="fruit">
    <datalist id="fruits">
        <option value="apple">
        <option value="banana">
        <option value="orange">
        <option value="grape">
    </datalist>
</body>
</html>
